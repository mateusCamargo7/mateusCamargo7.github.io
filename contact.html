<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Blog - Contato</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">

    <style>

        .caixa-contato{
            max-width: 600px;
            margin: 0 auto 3rem auto;
        }

        .formulario-inputs{
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .formulario-inputs label{
            font-weight: bold;
        }

    </style>

</head>

<body>

    <header class="barraDeCima">

        <nav>
            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre Mim</a></li>
                <li><a href="curriculum.html">Currículo</a></li>
                <li><a href="contact.html">Contato</a></li>
                <li><a href="receitas.html">Receitas</a></li>
            </ul>
        </nav>

        <div class="botoes">
            <button id="modoEscuro">Modo Noturno</button>
            <button id="AumentarFonte">A+</button>
            <button id="DiminuirFonte">A-</button>
        </div>

    </header>

    <main>

        <section class="intro caixa-contato">

            <h1>Entre em Contato</h1>

            <p style="text-align: center; margin-bottom: 2rem;">
                Preencha o formulário abaixo para me enviar uma mensagem.
            </p>

            <form
                id="formularioContato"
                class="contact-form"
                style="border: none; box-shadow: none; padding: 0;"
            >

                <div class="formulario-inputs">
                    <label for="nome">Nome Completo:</label>
                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                    >
                </div>

                <div class="formulario-inputs">
                    <label for="email">E-mail:</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu melhor e-mail"
                    >
                </div>

                <button
                    type="submit"
                    style="width: 100%; padding: 0.8rem;"
                >
                    Enviar Mensagem
                </button>

                <p
                    id="mensagemFormulario"
                    style="font-weight: bold; margin-top: 15px; text-align: center;"
                ></p>

            </form>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
